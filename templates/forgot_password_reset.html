{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-16rem)] flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-2xl font-bold leading-9 tracking-tight text-slate-900 dark:text-white">Reset your password</h2>
        <p class="mt-2 text-center text-sm text-slate-600 dark:text-slate-400">
            Choose a strong password to secure your account.
        </p>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-[400px]">
        <div class="bg-white dark:bg-slate-900 px-6 py-12 shadow-sm border border-slate-200 dark:border-slate-800 sm:rounded-2xl sm:px-12">
            {% if messages %}
                {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg text-sm bg-red-50 text-red-800 dark:bg-red-900/30 dark:text-red-200">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form class="space-y-6" action="{% url 'forgot_password_reset' %}" method="POST">
                {% csrf_token %}
                <div>
                    <label for="password" class="block text-sm font-medium leading-6 text-slate-900 dark:text-white">New Password</label>
                    <div class="mt-2">
                        <input id="password" name="password" type="password" required class="input-field">
                    </div>
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium leading-6 text-slate-900 dark:text-white">Confirm New Password</label>
                    <div class="mt-2">
                        <input id="confirm_password" name="confirm_password" type="password" required class="input-field">
                    </div>
                </div>

                <div>
                    <button type="submit" class="btn btn-primary w-full py-2.5">Update Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
