<div id="chapter-content-container">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm overflow-hidden">
        <div class="border-b border-slate-100 dark:border-slate-800 px-4 sm:px-8 py-4 bg-slate-50/50 dark:bg-slate-950/30 flex justify-between items-center">
            <span class="text-[10px] sm:text-xs font-mono text-slate-500 truncate mr-2">{{ current_chapter.title }}.md</span>
            <span class="text-[10px] sm:text-xs text-slate-400 whitespace-nowrap">Estimated read: 5 mins</span>
        </div>
        <article class="p-6 sm:p-12 prose prose-slate dark:prose-invert max-w-none 
                        prose-headings:font-extrabold prose-headings:tracking-tight
                        prose-headings:break-words
                        prose-img:rounded-xl">
            {{ content_html|safe }}
        </article>
    </div>
    
    <script>
        // Re-initialize copy buttons for new content
        document.querySelectorAll('#chapter-content-container .code-container').forEach(container => {
            const copyBtn = container.querySelector('.copy-code-btn');
            const pre = container.querySelector('pre');
            if (copyBtn) {
                copyBtn.className = "absolute top-3 right-3 p-1.5 bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700 rounded-md text-xs text-slate-300 transition-colors z-10";
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(pre.innerText).then(() => {
                        const originalText = copyBtn.innerText;
                        copyBtn.innerText = "Copied!";
                        setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
                    });
                });
            }
        });
        
        // Update document title
        document.title = "{{ current_chapter.title }} - {{ subject.title }} - abyshergill.com";
        
        // Scroll to top of content with offset for sticky header
        const headerHeight = 80; // Approximate header height
        window.scrollTo({ top: 0, behavior: 'smooth' });
    </script>
</div>
